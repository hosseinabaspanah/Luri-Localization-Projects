name: Luri Translation Issue
description: Report a translation problem or suggest a better version / گزارش مشکل یا پیشنهاد اصلاح ترجمه لُری

title: ""
labels: ["translation"]

body:
  - type: input
    id: project
    attributes:
      label: "Project name / اسم پروژه"
      description: "اسم پروژه‌ای که مشکل در آن دیده شده را بنویس / Enter the project where you saw the issue"
      placeholder: "Firefox / V2rayNG"
    validations:
      required: true

  - type: dropdown
    id: issue_type
    attributes:
      label: "Issue type / نوع مشکل"
      description: "یک گزینه را انتخاب کنید / Select one option"
      options:
        - "Grammar / اشتباه گرامری"
        - "Wrong meaning / معنی اشتباه"
        - "Bad wording / انتخاب کلمه نامناسب"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## 🧠 راهنما / Guide

        فقط یکی از گزینه‌ها را انتخاب کنید / Choose only one option.

        ---

        ### 🟡 Grammar / اشتباه گرامری
        جمله ترجمه شده ولی ساختار آن درست یا طبیعی نیست.  
        The sentence is translated but the structure is not natural or correct.

        **مثال / Example:**
        - ❌ من فایل را دانلود کردن است  
        - ✔ من در حال دانلود فایل هستم  

        - ❌ او هستند می‌رود  
        - ✔ او در حال رفتن است  

        ---

        ### 🔴 Wrong meaning / معنی اشتباه
        معنی جمله اشتباه منتقل شده است.  
        The meaning of the sentence is incorrect.

        **مثال / Example:**
        - ❌ Save = حذف کردن  
        - ✔ Save = ذخیره کردن  

        - ❌ Delete = ذخیره کردن  
        - ✔ Delete = حذف کردن  

        ---

        ### 🔵 Bad wording / انتخاب کلمه نامناسب
        معنی درست است ولی انتخاب واژه مناسب یا یکدست نیست.  
        The meaning is correct but the word choice is not consistent or natural.

        **مثال / Example:**
        - Settings = تنظیمات / پیکربندی (باید یکی استفاده شود / choose one)
        - File = فایل / پرونده (باید یکدست شود / must be consistent)

  - type: textarea
    id: current
    attributes:
      label: "Current translation / ترجمه فعلی"
      description: "ترجمه فعلی را وارد کنید / Paste the current translation"
      placeholder: "مثال: فایل در حال باز شدن است / Example: file is opening"
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: "Suggested fix / پیشنهاد شما"
      description: "نسخه بهتر را بنویسید / Write your improved version"
      placeholder: "مثال: در حال باز کردن فایل / Example: opening file"
    validations:
      required: true

  - type: textarea
    id: note
    attributes:
      label: "Notes (optional) / توضیحات (اختیاری)"
      description: "اگر خواستی توضیح بده / Optional explanation"
    validations:
      required: false
