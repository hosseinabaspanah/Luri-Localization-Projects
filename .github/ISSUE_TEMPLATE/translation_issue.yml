name: Luri Translation Issue
description: Report translation problems or suggest improvements / گزارش یا پیشنهاد اصلاح ترجمه لُری

title: "[LURI] "
labels: ["translation"]

body:
  - type: dropdown
    id: issue_type
    attributes:
      label: "Issue type / نوع مشکل"
      description: |
        Please select the type of issue / لطفاً نوع مشکل را انتخاب کنید
      options:
        - "Grammar issue / اشتباه گرامری"
        - "Wrong translation / ترجمه اشتباه"
        - "Terminology issue / واژه‌گزینی نامناسب"

  - type: markdown
    attributes:
      value: |
        ## 🧠 Guide / راهنما

        ### 1) Grammar issue / اشتباه گرامری
        Use this when the sentence structure is incorrect.  
        از این گزینه وقتی استفاده کن که جمله از نظر دستوری مشکل دارد.

        **Example / مثال:**
        - ❌ He are coming / او هستند می‌آید  
        - ✔ He is coming / او در حال آمدن است  

        ---

        ### 2) Wrong translation / ترجمه اشتباه
        Use this when the meaning is incorrect or misleading.  
        وقتی معنی جمله اشتباه ترجمه شده باشد.

        **Example / مثال:**
        - ❌ Save = حذف کردن  
        - ✔ Save = ذخیره کردن  

        ---

        ### 3) Terminology issue / واژه‌گزینی نامناسب
        Use this when the translation is correct but the chosen word is not standard or consistent.  
        وقتی ترجمه درست است اما واژه مناسب یا یکدست نیست.

        **Example / مثال:**
        - "Settings" → تنظیمات / پیکربندی (باید یکی یکدست باشد)

  - type: textarea
    id: current
    attributes:
      label: "Current translation / ترجمه فعلی"
      description: "Paste the current Luri translation / ترجمه فعلی را وارد کنید"
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: "Suggested fix / پیشنهاد اصلاح"
      description: "Your improved version / نسخه پیشنهادی شما"
    validations:
      required: true

  - type: textarea
    id: note
    attributes:
      label: "Notes (optional) / توضیحات (اختیاری)"
      description: "Extra explanation if needed / توضیحات اضافه (اختیاری)"
    validations:
      required: false
